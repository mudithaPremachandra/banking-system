# =============================================================================
# nginx Configuration for React SPA
# OWNER: Muditha (DevOps)
#
# PURPOSE: Serves the Vite-built React app from the Docker container.
# The critical part is the `try_files` directive — without it, any URL
# other than "/" gives a 404 because nginx tries to find a physical file
# matching the path (e.g., /dashboard), which doesn't exist in the dist folder.
# try_files falls back to /index.html, letting React Router handle routing.
# =============================================================================
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: serve index.html for any path not matching a real file
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
